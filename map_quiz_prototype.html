<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Map Quiz Mode - Development</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            background: #f0f2f5;
            height: 100vh;
            overflow: hidden;
        }
        
        .map-quiz-container {
            display: flex;
            height: 100vh;
        }
        
        .quiz-panel {
            width: 350px;
            background: white;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }
        
        .quiz-header {
            background: linear-gradient(135deg, #36d1dc, #5b86e5);
            color: white;
            padding: 20px;
        }
        
        .quiz-header h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        
        .quiz-stats {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }
        
        .flag-section {
            padding: 30px;
            text-align: center;
            background: #f8f9fa;
        }
        
        .flag-section h2 {
            margin-bottom: 20px;
            color: #333;
            font-size: 1.2rem;
        }
        
        .flag-display {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        .flag-display img {
            max-width: 280px;
            height: auto;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .instruction {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #5b86e5;
            margin: 20px;
        }
        
        .instruction h3 {
            color: #0066cc;
            margin-bottom: 10px;
            font-size: 1rem;
        }
        
        .instruction p {
            color: #333;
            font-size: 14px;
            line-height: 1.4;
        }
        
        .controls {
            padding: 20px;
            margin-top: auto;
        }
        
        .control-btn {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .next-btn {
            background: #28a745;
            color: white;
        }
        
        .next-btn:hover {
            background: #218838;
        }
        
        .next-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .skip-btn {
            background: #ffc107;
            color: #333;
        }
        
        .skip-btn:hover {
            background: #e0a800;
        }
        
        .end-btn {
            background: #dc3545;
            color: white;
        }
        
        .end-btn:hover {
            background: #c82333;
        }
        
        .map-container {
            flex: 1;
            position: relative;
        }
        
        #world-map {
            width: 100%;
            height: 100%;
        }
        
        .feedback {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            z-index: 1000;
            transform: translateY(-100px);
            opacity: 0;
            transition: all 0.5s ease;
        }
        
        .feedback.show {
            transform: translateY(0);
            opacity: 1;
        }
        
        .feedback.correct {
            background: #28a745;
        }
        
        .feedback.incorrect {
            background: #dc3545;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1000;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #5b86e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Country highlight styles */
        .country-hover {
            fill-opacity: 0.7 !important;
            stroke: #fff !important;
            stroke-width: 2 !important;
        }
        
        .country-correct {
            fill: #28a745 !important;
            fill-opacity: 0.8 !important;
            stroke: #155724 !important;
            stroke-width: 3 !important;
        }
        
        .country-incorrect {
            fill: #dc3545 !important;
            fill-opacity: 0.8 !important;
            stroke: #721c24 !important;
            stroke-width: 3 !important;
        }
        
        @media (max-width: 768px) {
            .map-quiz-container {
                flex-direction: column;
            }
            
            .quiz-panel {
                width: 100%;
                height: 50vh;
                order: 2;
            }
            
            .map-container {
                height: 50vh;
                order: 1;
            }
            
            .flag-section {
                padding: 15px;
            }
            
            .flag-display img {
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="map-quiz-container">
        <div class="quiz-panel">
            <div class="quiz-header">
                <h1>🗺️ Map Quiz Mode</h1>
                <div class="quiz-stats">
                    <span>Question: <span id="current-q">1</span>/<span id="total-q">25</span></span>
                    <span>Score: <span id="score">0</span></span>
                </div>
            </div>
            
            <div class="flag-section">
                <h2>Which country has this flag?</h2>
                <div class="flag-display">
                    <img id="flag-image" src="" alt="Country flag">
                </div>
            </div>
            
            <div class="instruction">
                <h3>📍 How to Play:</h3>
                <p>Look at the flag above, then <strong>click on the country</strong> on the world map. Small countries have enlarged click areas to make them easier to select.</p>
            </div>
            
            <div class="controls">
                <button class="control-btn next-btn" id="next-btn" disabled>Next Question</button>
                <button class="control-btn skip-btn" id="skip-btn">Skip Question</button>
                <button class="control-btn end-btn" id="end-quiz-btn">End Quiz</button>
            </div>
        </div>
        
        <div class="map-container">
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Loading world map...</p>
            </div>
            <div id="world-map"></div>
            <div class="feedback" id="feedback"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Game state
        let map;
        let countriesLayer;
        let currentQuestion = 0;
        let score = 0;
        let totalQuestions = 25;
        let currentAnswer = '';
        let answered = false;
        let quiz = [];
        
        // Sample countries data - this would normally come from countries.js
        const countries = [
            { name: "Canada", flag: "https://flagcdn.com/w320/ca.png", code: "CA" },
            { name: "United States", flag: "https://flagcdn.com/w320/us.png", code: "US" },
            { name: "United Kingdom", flag: "https://flagcdn.com/w320/gb.png", code: "GB" },
            { name: "France", flag: "https://flagcdn.com/w320/fr.png", code: "FR" },
            { name: "Germany", flag: "https://flagcdn.com/w320/de.png", code: "DE" },
            { name: "Italy", flag: "https://flagcdn.com/w320/it.png", code: "IT" },
            { name: "Spain", flag: "https://flagcdn.com/w320/es.png", code: "ES" },
            { name: "Japan", flag: "https://flagcdn.com/w320/jp.png", code: "JP" },
            { name: "China", flag: "https://flagcdn.com/w320/cn.png", code: "CN" },
            { name: "Australia", flag: "https://flagcdn.com/w320/au.png", code: "AU" },
            { name: "Brazil", flag: "https://flagcdn.com/w320/br.png", code: "BR" },
            { name: "India", flag: "https://flagcdn.com/w320/in.png", code: "IN" },
            { name: "Mexico", flag: "https://flagcdn.com/w320/mx.png", code: "MX" },
            { name: "Russia", flag: "https://flagcdn.com/w320/ru.png", code: "RU" },
            { name: "South Korea", flag: "https://flagcdn.com/w320/kr.png", code: "KR" },
        ];
        
        // Country name mappings for GeoJSON data
        const countryMappings = {
            "United States of America": "United States",
            "United Kingdom": "United Kingdom",
            "South Korea": "Republic of Korea",
            "Russia": "Russian Federation",
            // Add more mappings as needed
        };
        
        // Initialize the quiz
        function initQuiz() {
            // Shuffle countries and select questions
            const shuffled = [...countries].sort(() => Math.random() - 0.5);
            quiz = shuffled.slice(0, totalQuestions);
            
            // Update UI
            document.getElementById('total-q').textContent = totalQuestions;
            
            // Initialize map
            initMap();
        }
        
        // Initialize the map
        async function initMap() {
            try {
                // Create map
                map = L.map('world-map', {
                    zoomControl: false,
                    scrollWheelZoom: false,
                    doubleClickZoom: false,
                    boxZoom: false,
                    keyboard: false,
                    dragging: true,
                    touchZoom: false
                }).setView([20, 0], 2);
                
                // Add OpenStreetMap tiles
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors',
                    maxZoom: 2,
                    minZoom: 2
                }).addTo(map);
                
                // Load country boundaries
                await loadCountryBoundaries();
                
                // Start first question
                showQuestion();
                
                // Hide loading
                document.getElementById('loading').style.display = 'none';
                
            } catch (error) {
                console.error('Error initializing map:', error);
                document.getElementById('loading').innerHTML = '<p>Error loading map. Please refresh the page.</p>';
            }
        }
        
        // Load country boundaries (using a public GeoJSON source)
        async function loadCountryBoundaries() {
            try {
                // Using a simplified world countries GeoJSON
                const response = await fetch('https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson');
                const geoData = await response.json();
                
                // Style function for countries
                const countryStyle = {
                    fillColor: '#3388ff',
                    weight: 1,
                    opacity: 0.8,
                    color: '#666',
                    fillOpacity: 0.3
                };
                
                // Create countries layer
                countriesLayer = L.geoJSON(geoData, {
                    style: countryStyle,
                    onEachFeature: onEachCountry
                }).addTo(map);
                
            } catch (error) {
                console.error('Error loading country boundaries:', error);
                // Fallback: create a simple clickable world
                createFallbackMap();
            }
        }
        
        // Handle country interactions
        function onEachCountry(feature, layer) {
            const countryName = feature.properties.name || feature.properties.NAME || feature.properties.NAME_EN;
            
            // Store country name in layer
            layer.countryName = countryName;
            
            // Mouse events
            layer.on({
                mouseover: function(e) {
                    if (!answered) {
                        e.target.setStyle({
                            weight: 3,
                            color: '#666',
                            fillOpacity: 0.6
                        });
                    }
                },
                mouseout: function(e) {
                    if (!answered) {
                        countriesLayer.resetStyle(e.target);
                    }
                },
                click: function(e) {
                    if (!answered) {
                        handleCountryClick(countryName, layer);
                    }
                }
            });
            
            // Add tooltip
            layer.bindTooltip(countryName, {
                permanent: false,
                direction: 'center',
                className: 'country-tooltip'
            });
        }
        
        // Handle country click
        function handleCountryClick(clickedCountry, layer) {
            answered = true;
            
            // Normalize country names
            const normalizedClicked = normalizeCountryName(clickedCountry);
            const normalizedAnswer = normalizeCountryName(currentAnswer);
            
            const isCorrect = normalizedClicked === normalizedAnswer;
            
            // Visual feedback
            if (isCorrect) {
                layer.setStyle({
                    fillColor: '#28a745',
                    fillOpacity: 0.8,
                    weight: 3,
                    color: '#155724'
                });
                showFeedback('Correct! 🎉', true);
                score++;
                document.getElementById('score').textContent = score;
            } else {
                layer.setStyle({
                    fillColor: '#dc3545',
                    fillOpacity: 0.8,
                    weight: 3,
                    color: '#721c24'
                });
                showFeedback(`Incorrect. That's ${clickedCountry}. The correct answer is ${currentAnswer}.`, false);
                
                // Highlight correct country if visible
                highlightCorrectCountry();
            }
            
            // Enable next button
            document.getElementById('next-btn').disabled = false;
        }
        
        // Normalize country names for comparison
        function normalizeCountryName(name) {
            // Apply mappings
            if (countryMappings[name]) {
                return countryMappings[name].toLowerCase();
            }
            return name.toLowerCase();
        }
        
        // Highlight correct country
        function highlightCorrectCountry() {
            countriesLayer.eachLayer(function(layer) {
                const layerCountry = normalizeCountryName(layer.countryName || '');
                const answerCountry = normalizeCountryName(currentAnswer);
                
                if (layerCountry === answerCountry) {
                    setTimeout(() => {
                        layer.setStyle({
                            fillColor: '#28a745',
                            fillOpacity: 0.6,
                            weight: 2,
                            color: '#155724'
                        });
                    }, 1000);
                }
            });
        }
        
        // Show feedback message
        function showFeedback(message, isCorrect) {
            const feedback = document.getElementById('feedback');
            feedback.textContent = message;
            feedback.className = 'feedback show ' + (isCorrect ? 'correct' : 'incorrect');
            
            setTimeout(() => {
                feedback.classList.remove('show');
            }, 3000);
        }
        
        // Show current question
        function showQuestion() {
            if (currentQuestion >= totalQuestions) {
                endQuiz();
                return;
            }
            
            const question = quiz[currentQuestion];
            currentAnswer = question.name;
            
            // Update UI
            document.getElementById('current-q').textContent = currentQuestion + 1;
            document.getElementById('flag-image').src = question.flag;
            document.getElementById('flag-image').alt = `Flag of ${question.name}`;
            
            // Reset state
            answered = false;
            document.getElementById('next-btn').disabled = true;
            
            // Reset map styles
            if (countriesLayer) {
                countriesLayer.setStyle({
                    fillColor: '#3388ff',
                    weight: 1,
                    opacity: 0.8,
                    color: '#666',
                    fillOpacity: 0.3
                });
            }
        }
        
        // Next question
        function nextQuestion() {
            currentQuestion++;
            showQuestion();
        }
        
        // Skip question
        function skipQuestion() {
            showFeedback(`Skipped. The correct answer was ${currentAnswer}.`, false);
            setTimeout(() => {
                currentQuestion++;
                showQuestion();
            }, 2000);
        }
        
        // End quiz
        function endQuiz() {
            const percentage = Math.round((score / totalQuestions) * 100);
            let message;
            
            if (percentage >= 90) {
                message = "Outstanding! You're a geography expert!";
            } else if (percentage >= 75) {
                message = "Great job! You know your world geography well!";
            } else if (percentage >= 50) {
                message = "Good effort! Keep exploring the world map.";
            } else {
                message = "Keep learning! Practice makes perfect.";
            }
            
            alert(`Quiz Complete!\n\nYour Score: ${score}/${totalQuestions} (${percentage}%)\n\n${message}`);
            
            // Option to restart or return to main menu
            if (confirm("Would you like to play again?")) {
                location.reload();
            } else {
                window.close();
            }
        }
        
        // Fallback map for when GeoJSON fails to load
        function createFallbackMap() {
            // Create simple click areas for major countries
            // This is a simplified version - in production you'd want more complete coverage
            const majorCountries = [
                { name: "United States", bounds: [[25, -125], [49, -66]] },
                { name: "Canada", bounds: [[49, -141], [83, -52]] },
                { name: "Brazil", bounds: [[-33, -74], [5, -35]] },
                // Add more as needed
            ];
            
            majorCountries.forEach(country => {
                const rect = L.rectangle(country.bounds, {
                    color: '#3388ff',
                    weight: 1,
                    fillOpacity: 0.3
                }).addTo(map);
                
                rect.on('click', () => {
                    if (!answered) {
                        handleCountryClick(country.name, rect);
                    }
                });
            });
        }
        
        // Event listeners
        document.getElementById('next-btn').addEventListener('click', nextQuestion);
        document.getElementById('skip-btn').addEventListener('click', skipQuestion);
        document.getElementById('end-quiz-btn').addEventListener('click', endQuiz);
        
        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
</body>
</html>
